<html>
<body style="background:#0d1117">

<div id="card"></div>

<script>

function xmlEscape(str){
  return str.replace(/[<>&'"]/g, c => ({
    '<':'&lt;',
    '>':'&gt;',
    '&':'&amp;',
    "'":'&apos;',
    '"':'&quot;'
  }[c]))
}

async function load() {

  const data = await fetch("./mock.json").then(r => r.json())

  const user = data.user
  const rpg = data.rpg
  const stats = data.stats
  const top_languages = data.top_languages

  const colors = {
    Legendary: "#ff335f",
    Diamond: "#9900ff",
    Platinum: "#00c3ff",
    Gold: "#ffd700",
    Silver: "#c0c0c0",
    Bronze: "#cd7f32"
  }

  const themeColor = colors[rpg.tier] || "#00ff88"

  const xpNeeded = (rpg.level + 1) ** 2 * 100
  const progress = rpg.xp / xpNeeded
  const xpBarWidth = 100 * progress

  const avatarBase64 = `https://avatars.githubusercontent.com/${user}`

  const svg = `

    <svg width="500" height="400" viewBox="0 0 450 200" xmlns="http://www.w3.org/2000/svg">

      <style>
        .header { font: 700 18px 'Segoe UI', Ubuntu, Sans-Serif; fill: #fff; }
        .stat { font: 400 14px 'Segoe UI', Ubuntu, Sans-Serif; fill: #a9a9a9; }
        .rank { font: 800 24px 'Segoe UI', Ubuntu, Sans-Serif; fill: ${themeColor}; }
        .bold { font-weight: 700; fill: #fff; }
        .tier-label { font: 600 12px 'Segoe UI', Ubuntu, Sans-Serif; fill: ${themeColor}; }
      </style>

      <rect width="450" height="250" rx="15" fill="#0d1117" stroke="#30363d" stroke-width="2"/>

      <clipPath id="circleView">
        <circle cx="60" cy="60" r="40"/>
      </clipPath>

      <image href="${avatarBase64}" x="20" y="20" width="80" height="80" clip-path="url(#circleView)" />

      <text x="120" y="45" class="header">@${xmlEscape(user)}</text>
      <text x="120" y="65" class="tier-label">${xmlEscape(rpg.tier)} Tier in ${xmlEscape(rpg.guild)}</text>
      <text x="120" y="85" class="tier-label">${xmlEscape(rpg.devClass)} ${xmlEscape(rpg.subclass)} </text>

      <text x="120" y="105" class="stat">Level: <tspan class="bold">${rpg.level}</tspan></text>

      <rect x="200" y="98" width="120" height="10" rx="5" fill="#333"/>
      <rect x="200" y="98" width="${xpBarWidth}" height="10" rx="5" fill="${themeColor}"/>



      <line x1="20" y1="130" x2="430" y2="130" stroke="#30363d" stroke-width="1"/>



      <text x="20" y="150" class="header">Stats: </text>

      <text x="20" y="175" class="stat">Major Skills: 
        <tspan class="bold">${xmlEscape(top_languages.join(", "))}</tspan>
      </text>

      <text x="20" y="200" class="stat">Followers: <tspan class="bold">${stats.followers}</tspan></text>

      <text x="150" y="200" class="stat">Stars: <tspan class="bold">${stats.stars}</tspan></text>

      <text x="260" y="200" class="stat">Repos: <tspan class="bold">${stats.repos}</tspan></text>

      <text x="20" y="225" class="stat">Commits: <tspan class="bold">${stats.commits}</tspan></text>
      
      <text x="380" y="70" class="rank" text-anchor="middle">${rpg.level}</text>
      <text x="380" y="85" class="stat" text-anchor="middle" font-size="10">LEVEL</text>

    </svg>
  `

  document.getElementById("card").innerHTML = svg

}

load()

</script>

</body>
</html>
